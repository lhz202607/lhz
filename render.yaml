services:
  - type: web
    name: antique-game
    runtime: node
    plan: free
    buildCommand: pnpm install && cd frontend && pnpm install && pnpm build && cd ../backend && pnpm build
    startCommand: node backend/dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
    healthCheckPath: /api/health
